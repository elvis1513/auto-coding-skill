name: Publish to npm

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN_AVAILABLE: ${{ secrets.NPM_TOKEN != '' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: src/auto-coding-skill/requirements.txt

      - name: Install runtime dependencies
        run: python -m pip install --disable-pip-version-check --requirement src/auto-coding-skill/requirements.txt

      - name: Verify package
        run: npm run release:check

      - name: Verify release identity
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" && "${GITHUB_REF_NAME}" != "v${package_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}." >&2
            exit 1
          fi

      - name: Check npm registry
        id: registry
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version --json >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish
        if: steps.registry.outputs.published != 'true' && env.NPM_TOKEN_AVAILABLE == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Require external publication
        if: steps.registry.outputs.published != 'true' && env.NPM_TOKEN_AVAILABLE != 'true'
        run: |
          echo "NPM_TOKEN is not configured. Publish with the authorized local npm token before pushing the version tag." >&2
          exit 1

      - name: Verify npm publication
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          published="$(npm view "${package_name}@${package_version}" version --json | tr -d '\"')"
          test "${published}" = "${package_version}"
